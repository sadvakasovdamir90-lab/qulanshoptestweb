<script>
    // --- 1. АВТОРИЗАЦИЯ ЖӘНЕ 24 САҒАТТЫҚ ТЕКСЕРІС ---
    function checkAuth(pageUrl) {
        const isLoggedIn = localStorage.getItem('isLoggedIn');
        const lastAuthTime = localStorage.getItem('lastAuthTime'); 
        const now = new Date().getTime();
        const oneDay = 24 * 60 * 60 * 1000; 

        if (isLoggedIn !== 'true' || !lastAuthTime || (now - lastAuthTime > oneDay)) {
            localStorage.removeItem('isLoggedIn');
            localStorage.removeItem('lastAuthTime');
            localStorage.setItem('redirectTarget', pageUrl); 
            window.location.href = 'auth.html';
        } else {
            window.location.href = pageUrl;
        }
    }

    // --- 2. ЖАСЫРЫН БӨЛІМДЕРДІ БАСҚАРУ (Подарочные карты) ---
    function updatePrivateUI() {
        const isLoggedIn = localStorage.getItem('isLoggedIn');
        const lastAuthTime = localStorage.getItem('lastAuthTime');
        const now = new Date().getTime();
        const isValid = isLoggedIn === 'true' && (lastAuthTime && (now - lastAuthTime < 24 * 60 * 60 * 1000));

        const giftCardLinks = document.querySelectorAll('a[href="gift-cards.html"]');
        giftCardLinks.forEach(link => {
            // Тек тіркелген адамға ғана көрсетеміз, әйтпесе жасырамыз
            link.parentElement.style.display = isValid ? 'block' : 'none';
        });
    }

    // --- 3. ТІЛ ЖҮЙЕСІ ЖӘНЕ СЛАЙДЕР ---
    const slider = document.getElementById('slider');
    let slideIndex = 0;
    setInterval(() => { slideIndex = (slideIndex + 1) % 3; if(slider) slider.style.transform = `translateX(-${slideIndex * 100}%)`; }, 4000);

    function toggleLangMenu() { document.getElementById('lang-menu').classList.toggle('active'); }
    function setLanguage(lang) { localStorage.setItem('qulan_lang', lang); applyLanguage(lang); document.getElementById('lang-menu').classList.remove('active'); }

    function applyLanguage(lang) {
        const isKz = lang === 'kz';
        const els = {
            'current-lang-text': isKz ? "Қазақша" : "Русский",
            'txt-cabinet': isKz ? "Профиль" : "Профиль",
            'txt-fav': isKz ? "Таңдаулы" : "Избранное",
            'txt-cart': isKz ? "Себет" : "Корзина",
            'txt-cat-btn': isKz ? "Тауарлар категориясы" : "Категории товаров",
            'txt-hits': isKz ? "Хит тауарлар" : "Хиты продаж"
        };
        for (let id in els) { const el = document.getElementById(id); if(el) el.innerText = els[id]; }
        document.querySelectorAll('.btn-add-cart').forEach(btn => btn.innerText = isKz ? "Себетке салу" : "В корзину");
    }

    // --- 4. КАТЕГОРИЯЛАР ---
    function toggleCategories() {
        const catMenu = document.getElementById('category-menu');
        const chevron = document.getElementById('cat-chevron');
        if(catMenu) catMenu.classList.toggle('active');
        if(chevron) chevron.style.transform = catMenu.classList.contains('active') ? 'rotate(180deg)' : 'rotate(0deg)';
    }

    // --- 5. GEMINI AI CHAT ---
    const GEMINI_API_KEY = "AIzaSyBU1eWfKxsuIJshtMzUlR4YKucfuRTvWog";
    const GEMINI_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`;
    function toggleAIChat() { document.getElementById('ai-chat-window').classList.toggle('hidden'); }
    async function queryGemini(userMessage) {
        const isRussian = /[а-яА-Я]/.test(userMessage);
        const systemInstruction = `Ты Qulan AI, помощник магазина QulanShop. Отвечай кратко, дружелюбно. Язык: ${isRussian ? 'russian' : 'kazakh'}.`;
        try {
            const response = await fetch(GEMINI_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ parts: [{ text: systemInstruction + " Текст: " + userMessage }] }] })
            });
            const data = await response.json();
            return data.candidates[0].content.parts[0].text.trim();
        } catch (e) { return null; }
    }
    async function sendMessage() {
        const input = document.getElementById('chat-input');
        const container = document.getElementById('chat-messages');
        if (!input || !input.value.trim()) return;
        const text = input.value.trim();
        container.innerHTML += `<div class="flex justify-end mb-3"><div class="bg-orange-600 text-white p-3 rounded-2xl max-w-[85%] text-sm italic">${text}</div></div>`;
        input.value = '';
        const aiReply = await queryGemini(text);
        if (aiReply) container.innerHTML += `<div class="flex justify-start mb-3"><div class="bg-white border p-3 rounded-2xl max-w-[85%] text-sm italic">${aiReply}</div></div>`;
        container.scrollTop = container.scrollHeight;
    }

    // --- 6. ТАУАРЛАР ЖҮЙЕСІ ---
    function renderProducts() {
        const container = document.getElementById('products-container');
        if (!container) return;
        const products = JSON.parse(localStorage.getItem('products')) || [];
        if (products.length === 0) {
            container.innerHTML = `<div class="col-span-full text-center py-20 italic text-gray-400">Товары временно отсутствуют...</div>`;
            return;
        }
        container.innerHTML = products.map(p => `
            <div class="product-card bg-white rounded-[2rem] p-3 shadow-sm hover:shadow-xl border border-gray-100 relative group cursor-pointer" onclick="location.href='product.html?id=${p.id}'">
                <div class="w-full h-32 md:h-40 bg-gray-50 rounded-2xl mb-4 overflow-hidden flex items-center justify-center">
                    <img src="${p.img}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500" onerror="this.src='https://via.placeholder.com/150'">
                </div>
                <p class="text-orange-600 font-black text-xl italic">${Number(p.price).toLocaleString()} ₸</p>
                <h3 class="product-name text-[11px] font-bold h-8 overflow-hidden mb-3 text-gray-800">${p.name}</h3>
                <button onclick="event.stopPropagation(); checkAuth('cart.html')" 
                        class="w-full bg-orange-600 text-white py-2 rounded-xl font-black text-[10px] uppercase tracking-widest hover:bg-orange-700 transition-all">
                    В корзину
                </button>
            </div>
        `).reverse().join('');
    }

    // --- 7. БАННЕРЛЕР МЕН ТАЙМЕР (ТҮЗЕТІЛДІ) ---
    function loadSiteBanners() {
        const savedBanners = JSON.parse(localStorage.getItem('site_banners'));
        if (savedBanners) {
            if (savedBanners.main && savedBanners.main[0]) document.getElementById('slider-img-1').src = savedBanners.main[0];
            if (savedBanners.main && savedBanners.main[1]) document.getElementById('slider-img-2').src = savedBanners.main[1];
            if (savedBanners.main && savedBanners.main[2]) document.getElementById('slider-img-3').src = savedBanners.main[2];
            if (savedBanners.small) { 
                const el = document.getElementById('small-banner-img');
                if(el) el.src = savedBanners.small;
            }
        }
    }

    function startGlobalTimer() {
        const banners = JSON.parse(localStorage.getItem('site_banners'));
        const promoSection = document.getElementById('promo-section');
        
        // АКЦИЯ ЖОҚ БОЛСА - БЛОКТЫ ӨШІРУ
        if (!banners || !banners.deadline) { 
            if(promoSection) promoSection.style.display = 'none'; 
            return; 
        }

        const targetDate = new Date(banners.deadline).getTime();
        const interval = setInterval(() => {
            const now = new Date().getTime();
            const diff = targetDate - now;
            
            if (diff <= 0) { 
                clearInterval(interval); 
                if(promoSection) promoSection.style.display = 'none'; 
                return; 
            }

            if(promoSection) promoSection.style.display = 'block';
            
            const d = Math.floor(diff / (1000*60*60*24));
            const h = Math.floor((diff % (1000*60*60*24)) / (1000*60*60));
            const m = Math.floor((diff % (1000*60*60)) / (1000*60));
            const s = Math.floor((diff % (1000*60)) / 1000);

            if(document.getElementById('days')) document.getElementById('days').innerText = d < 10 ? '0'+d : d;
            if(document.getElementById('hours')) document.getElementById('hours').innerText = h < 10 ? '0'+h : h;
            if(document.getElementById('minutes')) document.getElementById('minutes').innerText = m < 10 ? '0'+m : m;
            if(document.getElementById('seconds')) document.getElementById('seconds').innerText = s < 10 ? '0'+s : s;
        }, 1000);
    }

    // БЕТ ЖҮКТЕЛГЕНДЕ БӘРІН ІСКЕ ҚОСУ
    window.onload = () => {
        applyLanguage(localStorage.getItem('qulan_lang') || 'ru');
        renderProducts();
        loadSiteBanners();
        startGlobalTimer();
        updatePrivateUI();
    };
</script>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Авторизация | QulanShop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        
        :root { --main-orange: #f26522; --dark-bg: #0f172a; }
        body { font-family: 'Inter', sans-serif; background-color: var(--dark-bg); -webkit-tap-highlight-color: transparent; }
        
        .auth-container { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .hidden-section { display: none !important; }
        
        /* iPhone & Android адаптация */
        input { font-size: 16px !important; } /* iOS-та зум болмауы үшін */
        .glass-input { background: #f8fafc; border: 2px solid #e2e8f0; transition: all 0.2s; }
        .glass-input:focus { border-color: var(--main-orange); background: white; box-shadow: 0 0 0 4px rgba(242, 101, 34, 0.1); }
        
        .btn-primary { background: var(--main-orange); transition: all 0.2s active:scale-95; }
        .btn-primary:active { transform: scale(0.97); }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="auth-container w-full max-w-[400px] bg-white rounded-[2.5rem] shadow-2xl p-8 md:p-10 relative overflow-hidden">
        
        <div class="text-center mb-8">
            <h1 class="text-3xl font-[800] italic text-orange-600 uppercase tracking-tighter">Qulan<span class="text-slate-800">Shop</span></h1>
            <p id="auth-subtitle" class="text-gray-400 text-[10px] font-bold uppercase mt-1 tracking-widest italic">Добро пожаловать!</p>
        </div>

        <div id="login-section" class="space-y-5">
            <h2 class="text-xl font-bold text-gray-800 text-center uppercase tracking-tight">Вход в аккаунт</h2>
            <div class="space-y-4">
                <div>
    <label class="block text-[10px] font-bold text-gray-400 uppercase ml-2 mb-1">Номер телефона</label>
    <input type="tel" 
           id="login-phone" 
           value="+7 " 
           oninput="fixPhone(this)"
           placeholder="+7 (777) 777-7777" 
           class="w-full p-4 rounded-2xl glass-input font-semibold text-slate-700 outline-none">
</div>
                <div class="relative">
                    <label class="block text-[10px] font-bold text-gray-400 uppercase ml-2 mb-1">Пароль</label>
                    <input type="password" id="login-pass" placeholder="Минимум 6 символов" class="w-full p-4 pr-12 rounded-2xl glass-input font-semibold text-slate-700 outline-none">
                    <button onclick="togglePass('login-pass', this)" class="absolute right-4 top-9 text-gray-400 p-1"><i class="fas fa-eye"></i></button>
                </div>
            </div>
            <div class="text-right">
                <button onclick="switchMode('forgot')" class="text-[11px] font-bold text-orange-600 hover:underline italic uppercase">Забыли пароль?</button>
            </div>
            <button onclick="handleLogin()" class="btn-primary w-full text-white py-4 rounded-2xl font-bold uppercase italic shadow-lg shadow-orange-200">Войти</button>
            <p class="text-center text-xs text-gray-400 font-medium">Нет аккаунта? <button onclick="switchMode('reg')" class="text-orange-600 font-bold underline">Зарегистрироваться</button></p>
        </div>

      <div id="reg-section" class="hidden-section space-y-5">
    <h2 class="text-xl font-bold text-gray-800 text-center uppercase tracking-tight">Регистрация</h2>
    <div class="space-y-3">
        <input type="text" id="reg-name" placeholder="ФИО" class="w-full p-4 rounded-2xl glass-input font-semibold text-sm outline-none">
        
        <div class="relative">
            <input type="tel" 
                   id="reg-phone" 
                   value="+7 " 
                   oninput="fixPhone(this)"
                   placeholder="+7 (705) 000-00-00" 
                   class="w-full p-4 rounded-2xl glass-input font-semibold text-slate-700 outline-none">
        </div>
    </div>
    
    <button type="button" 
            onclick="startPhoneAuth('reg')" 
            class="btn-primary w-full text-white py-4 rounded-2xl font-bold uppercase italic shadow-lg shadow-orange-200">
        Создать аккаунт
    </button>
    
    <p class="text-center text-xs text-gray-400 font-medium italic">
        Уже есть аккаунт? <button type="button" onclick="switchMode('login')" class="text-orange-600 font-bold underline">Войти</button>
    </p>
</div>

        <div id="forgot-section" class="hidden-section space-y-5">
    <h2 class="text-xl font-bold text-gray-800 text-center uppercase tracking-tight">Восстановление</h2>
    <div class="space-y-4 text-center text-xs text-gray-500 font-medium px-4">
        Введите номер телефона для получения кода подтверждения
    </div>
    
    <div class="relative">
        <label class="block text-[10px] font-bold text-gray-400 uppercase ml-2 mb-1">Номер телефона</label>
        <input type="tel" 
               id="forgot-phone" 
               value="+7 " 
               oninput="fixPhone(this)"
               placeholder="+7 (705) 000-00-00" 
               class="w-full p-4 rounded-2xl glass-input font-semibold text-slate-700 outline-none">
    </div>

    <button type="button" 
            onclick="startPhoneAuth('forgot')" 
            class="btn-primary w-full text-white py-4 rounded-2xl font-bold uppercase italic shadow-lg shadow-orange-200">
        Отправить код
    </button>
    
    <button type="button" 
            onclick="switchMode('login')" 
            class="w-full text-gray-400 text-[10px] font-bold uppercase tracking-widest">
        Назад
    </button>
</div>

        <div id="verify-section" class="hidden-section space-y-6 text-center">
            <h2 class="text-xl font-bold text-gray-800 uppercase tracking-tight">Подтверждение</h2>
            <p class="text-[11px] text-orange-600 font-bold uppercase tracking-tighter italic animate-pulse">Код отправлен на ваш номер</p>
            <div class="flex justify-center">
                <input type="text" id="verify-code" maxlength="6" placeholder="000000" class="w-full max-w-[200px] p-4 rounded-2xl glass-input font-black text-center text-2xl tracking-[0.4em] outline-none">
            </div>
            <button onclick="confirmCode()" class="w-full bg-emerald-500 text-white py-4 rounded-2xl font-bold uppercase italic shadow-lg shadow-emerald-100">Проверить код</button>
        </div>

        <div id="new-pass-section" class="hidden-section space-y-5">
            <h2 class="text-xl font-bold text-gray-800 text-center uppercase tracking-tight">Новый пароль</h2>
            <div class="space-y-3">
                <div class="relative">
                    <input type="password" id="pass1" placeholder="Новый пароль" class="w-full p-4 pr-12 rounded-2xl glass-input font-semibold text-sm outline-none">
                    <button onclick="togglePass('pass1', this)" class="absolute right-4 top-4 text-gray-400"><i class="fas fa-eye"></i></button>
                </div>
                <div class="relative">
                    <input type="password" id="pass2" placeholder="Еще раз" class="w-full p-4 pr-12 rounded-2xl glass-input font-semibold text-sm outline-none">
                    <button onclick="togglePass('pass2', this)" class="absolute right-4 top-4 text-gray-400"><i class="fas fa-eye"></i></button>
                </div>
            </div>
            <button onclick="completeProcess()" class="btn-primary w-full text-white py-4 rounded-2xl font-bold uppercase italic shadow-lg shadow-orange-200 tracking-widest">Сохранить и войти</button>
        </div>

        <div id="recaptcha-container"></div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, RecaptchaVerifier, signInWithPhoneNumber } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAlzmYucRC37uq5gZvaqxiUJKwdzchWTxI",
        authDomain: "qulanshop-777.firebaseapp.com",
        projectId: "qulanshop-777",
        storageBucket: "qulanshop-777.firebasestorage.app",
        messagingSenderId: "209043294122",
        appId: "1:209043294122:web:1bced46ccbb78a4c6a8dd3"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    
    window.currentProcess = ''; 
    window.tempUser = {};

    window.fixPhone = function(input) {
        if (!input.value.startsWith('+7 ')) {
            input.value = '+7 ';
        }
    };

    window.recaptchaVerifier = new RecaptchaVerifier(auth, 'recaptcha-container', { 
        'size': 'invisible' 
    });

    window.switchMode = function(mode) {
        const sections = ['login-section', 'reg-section', 'forgot-section', 'verify-section', 'new-pass-section'];
        sections.forEach(s => {
            const el = document.getElementById(s);
            if (el) el.classList.add('hidden-section');
        });
        const target = document.getElementById(mode + '-section');
        if (target) target.classList.remove('hidden-section');

        const subtitle = document.getElementById('auth-subtitle');
        if (mode === 'login') subtitle.innerText = "Добро пожаловать!";
        if (mode === 'reg') subtitle.innerText = "Создайте личный кабинет";
        if (mode === 'forgot' || mode === 'verify') subtitle.innerText = "Восстановление доступа";
    };

    window.startPhoneAuth = function(mode) {
        window.currentProcess = mode;
        const phoneId = (mode === 'reg') ? 'reg-phone' : 'forgot-phone';
        const rawPhone = document.getElementById(phoneId).value;
        const phoneNumber = rawPhone.replace(/\s+/g, '');

        if (phoneNumber.length < 12) {
            Swal.fire('Ошибка', 'Введите полный номер телефона', 'error');
            return;
        }

        if (mode === 'reg') {
            const nameVal = document.getElementById('reg-name').value;
            window.tempUser = { name: nameVal, phone: phoneNumber };
        } else {
            window.tempUser = { phone: phoneNumber };
        }

        signInWithPhoneNumber(auth, phoneNumber, window.recaptchaVerifier)
            .then((result) => {
                window.confirmationResult = result;
                Swal.fire({ icon: 'success', title: 'Код отправлен!', timer: 2000, showConfirmButton: false });
                window.switchMode('verify');
            })
            .catch((error) => {
                console.error("Firebase Error:", error);
                // ОСЫ ЖЕРДЕГІ ӨЗГЕРІС: Енді қате болса да, код сұрайтын бетке ('verify') жібереді
                Swal.fire({
                    title: 'СМС жіберілмеді',
                    text: 'Локальді режимде кодты қолмен енгізу арқылы жалғастырамыз ба?',
                    icon: 'warning',
                    showCancelButton: true,
                    confirmButtonText: 'Иә'
                }).then((res) => {
                    if (res.isConfirmed) {
                        window.switchMode('verify'); 
                    }
                });
            });
    };

    window.confirmCode = function() {
        const code = document.getElementById('verify-code').value;
        
        // ТЕК ТЕКСЕРУ: Егер Firebase істеп тұрса, нақты кодты тексереді
        if (window.confirmationResult) {
            window.confirmationResult.confirm(code)
                .then(() => {
                    Swal.fire('Успешно!', 'Номер подтвержден ✅', 'success');
                    window.switchMode('new-pass');
                }).catch(() => {
                    Swal.fire('Ошибка', 'Неверный код.', 'error');
                });
        } else {
            // Егер СМС келмеген болса, бірақ сен кодты жазсаң, бәрібір өткізеді (локальді режим үшін)
            Swal.fire('Локальді режим', 'Код қабылданды ✅', 'info');
            window.switchMode('new-pass');
        }
    };

    window.completeProcess = function() {
        const p1 = document.getElementById('pass1').value;
        const p2 = document.getElementById('pass2').value;

        if (p1.length < 6 || p1 !== p2) {
            Swal.fire('Ошибка', 'Пароли не совпадают или короткие', 'error');
            return;
        }

        let users = JSON.parse(localStorage.getItem('users')) || [];
        
        if (window.currentProcess === 'reg') {
            const newUser = { id: Date.now(), name: window.tempUser.name, phone: window.tempUser.phone, password: p1, debt: 0 };
            users.push(newUser);
            localStorage.setItem('users', JSON.stringify(users));
            localStorage.setItem('currentUserId', newUser.id);
        } else if (window.currentProcess === 'forgot') {
            const userIdx = users.findIndex(u => u.phone === window.tempUser.phone);
            if (userIdx !== -1) {
                users[userIdx].password = p1;
                localStorage.setItem('users', JSON.stringify(users));
                localStorage.setItem('currentUserId', users[userIdx].id);
            }
        }

        localStorage.setItem('isLoggedIn', 'true');
        localStorage.setItem('lastAuthTime', new Date().getTime()); 
        window.location.href = 'profile.html';
    };

    window.handleLogin = function() {
        const rawPhone = document.getElementById('login-phone').value;
        const phone = rawPhone.replace(/\s+/g, '');
        const pass = document.getElementById('login-pass').value;
        
        let users = JSON.parse(localStorage.getItem('users')) || [];
        const user = users.find(u => u.phone === phone && u.password === pass);

        if (user) {
            localStorage.setItem('isLoggedIn', 'true');
            localStorage.setItem('currentUserId', user.id);
            localStorage.setItem('lastAuthTime', new Date().getTime()); 
            
            const redirectUrl = localStorage.getItem('redirectTarget') || 'profile.html';
            localStorage.removeItem('redirectTarget');
            
            Swal.fire({ icon: 'success', title: 'Добро пожаловать!', timer: 1500, showConfirmButton: false }).then(() => {
                window.location.href = redirectUrl;
            });
        } else {
            Swal.fire('Ошибка', 'Неверный номер или пароль!', 'warning');
        }
    };
    
    window.togglePass = function(id, btn) {
        const el = document.getElementById(id);
        const icon = btn.querySelector('i');
        el.type = (el.type === 'password') ? 'text' : 'password';
        icon.classList.toggle('fa-eye');
        icon.classList.toggle('fa-eye-slash');
    };
</script>
</body>
</html>
